name: Dependabot auto-merge

# `pull_request_target` è necessario: sugli eventi `pull_request` di Dependabot
# il GITHUB_TOKEN è read-only e non può abilitare l'auto-merge. Il job non fa
# checkout né esegue codice della PR, quindi non espone il token elevato.
# L'auto-merge attende comunque i check richiesti su main (CI, ecc.): senza un
# check obbligatorio configurato non fa nulla di rischioso, semplicemente non
# si attiva.
on:
  pull_request_target:
    types: [opened, reopened, synchronize]
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    name: Abilita auto-merge sicuro
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Leggi i metadati Dependabot
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Abilita auto-merge per patch e minor
        if: >-
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"
